# ─────────────────────────────────────────────────────────────
# Required .env vars (no defaults on secrets — must be set):
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   POSTGRES_NON_ROOT_USER, POSTGRES_NON_ROOT_PASSWORD
#   REDIS_PASSWORD
#   N8N_ENCRYPTION_KEY        (generate once, back up separately — losing it makes stored credentials unrecoverable)
#   N8N_RUNNERS_AUTH_TOKEN    (shared secret between n8n <-> runner sidecars)
#   N8N_HOST, WEBHOOK_URL
#   N8N_SMTP_* (if email notifications needed)
# ─────────────────────────────────────────────────────────────

x-n8n-image: &n8n-image n8nio/n8n:1.113.1
x-runner-image: &runner-image n8nio/runners:1.113.1   # MUST match n8n version exactly

x-n8n-common-env: &n8n-common-env
  # Database
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
  DB_POSTGRESDB_USER: ${POSTGRES_NON_ROOT_USER:-n8n}
  DB_POSTGRESDB_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}

  # Queue
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: 6379
  QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
  QUEUE_BULL_REDIS_DB: 2

  # Core
  N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
  GENERIC_TIMEZONE: ${TIMEZONE:-UTC}
  TZ: ${TIMEZONE:-UTC}

  # Task runners (mandatory as of n8n 2.0 — sandboxes Code node execution)
  N8N_RUNNERS_MODE: external
  N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
  OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"

  # Execution data hygiene — without this the executions table grows unbounded
  EXECUTIONS_DATA_PRUNE: "true"
  EXECUTIONS_DATA_MAX_AGE: 168          # hours = 7 days
  EXECUTIONS_DATA_SAVE_ON_ERROR: all
  EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
  EXECUTIONS_DATA_SAVE_ON_MANUAL: "true"

  # Privacy / telemetry
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_PERSONALIZATION_ENABLED: "false"
  N8N_HIRING_BANNER_ENABLED: "false"
  N8N_METRICS: "true"                   # keep true only if you scrape it (Prometheus); else set false

  # Logging
  N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
  N8N_LOG_OUTPUT: ${N8N_LOG_OUTPUT:-console}

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_NON_ROOT_USER: ${POSTGRES_NON_ROOT_USER:-n8n}
      POSTGRES_NON_ROOT_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M

  # ── n8n Main (UI, webhooks, trigger management) ─────────────
  n8n:
    image: *n8n-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *n8n-common-env
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_SMTP_HOST: ${N8N_SMTP_HOST}
      N8N_SMTP_PORT: ${N8N_SMTP_PORT:-587}
      N8N_SMTP_USER: ${N8N_SMTP_USER}
      N8N_SMTP_PASS: ${N8N_SMTP_PASS}
      N8N_SMTP_SENDER: ${N8N_SMTP_SENDER}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    # No published ports — nginx is the sole ingress point

  n8n-main-runner:
    image: *runner-image
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_MAX_OLD_SPACE_SIZE: 1024
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── n8n Worker (queue processing) ───────────────────────────
  n8n-worker:
    image: *n8n-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: worker --concurrency=10
    environment:
      <<: *n8n-common-env
      N8N_RUNNERS_TASK_BROKER_URI: http://localhost:5679
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - backend
    deploy:
      replicas: ${N8N_WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: "2"
          memory: 2G
    # NOTE: no container_name here — required for replicas to scale

  n8n-worker-runner:
    image: *runner-image
    restart: unless-stopped
    depends_on:
      - n8n-worker
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-worker:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_MAX_OLD_SPACE_SIZE: 1024
    networks:
      - backend
    deploy:
      replicas: ${N8N_WORKER_REPLICAS:-2}   # match worker replica count 1:1
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ── Nginx Reverse Proxy (sole internet-facing entrypoint) ───
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true    # postgres/redis/n8n/workers unreachable from outside the docker host
  frontend:
    driver: bridge
